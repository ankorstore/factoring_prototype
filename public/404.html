<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect: converts the path to a query string
      // so index.html can restore it via replaceState.
      // Detects base path automatically: /repo-name/ on github.io, / on custom domains.
      var l = window.location;
      var isSubpath = l.hostname.endsWith('.github.io');
      var pathSegmentsToKeep = isSubpath ? 1 : 0;
      var base = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      if (!base.endsWith('/')) base += '/';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
